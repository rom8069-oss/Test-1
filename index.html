<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Route & Rep Optimizer</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Lasso -->
  <script src="https://unpkg.com/leaflet-lasso"></script>

  <!-- Turf.js -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <!-- TOP BAR -->
  <div id="top-bar">

    <!-- File Upload -->
    <input type="file" id="file-input">

    <!-- Color Mode -->
    <select id="color-mode">
      <option value="rep">Color by Rep</option>
      <option value="segment">Color by Segment</option>
      <option value="premise">Color by Premise</option>
    </select>

    <!-- Multi-Rep Filter -->
    <div id="rep-filter-container">
      <button id="rep-filter-btn">Reps ▼</button>
      <div id="rep-filter-dropdown" class="dropdown-hidden"></div>
    </div>

    <!-- Search -->
    <div class="search-container">
      <input id="search-input" placeholder="Search by ID or Company">
      <button id="search-btn">Search</button>
    </div>

    <!-- Assign -->
    <select id="rep-select"></select>
    <button id="assign-btn" disabled>Assign</button>

    <!-- Export -->
    <button id="export-btn" disabled>Export CSV</button>

  </div>

  <!-- MAIN LAYOUT -->
  <div id="main">
    <div id="map"></div>

    <div id="sidebar">

      <h3>Selection Summary</h3>
      <div id="selection-summary">
        <p><strong>Selected:</strong> <span id="selected-count">0</span></p>
        <p><strong>Revenue:</strong> $<span id="selected-revenue">0.00</span></p>
        <ul id="selected-list"></ul>
      </div>

      <h3>Details</h3>
      <div id="detail-panel">
        <p>No account selected.</p>
      </div>

      <h3>Rep Overview</h3>
      <table id="route-table">
        <thead>
          <tr>
            <th>Rep</th>
            <th>Stops</th>
            <th>Revenue</th>
            <th>Avg</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>
  </div>

  <!-- APP JS -->
  <script src="app.js"></script>

</body>
</html>
