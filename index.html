<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Route & Rep Optimizer</title>

  <!-- Leaflet Core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet-lasso/dist/leaflet-lasso.css" />
  <script src="https://unpkg.com/leaflet-lasso/dist/leaflet-lasso.umd.js"></script>

  <!-- Your Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ============================ -->
<!-- TOP BAR CONTROLS -->
<!-- ============================ -->
<div id="top-bar">
  <input type="file" id="file-input" accept=".csv" />

  <select id="color-mode">
    <option value="rep">Color by Rep</option>
    <option value="segment">Color by Segment</option>
    <option value="premise">Color by Premise</option>
  </select>

  <select id="rep-filter">
    <option value="">All Reps</option>
  </select>

  <input type="text" id="search-input" placeholder="Search Customer ID / Company" />
  <button id="search-btn">Search</button>

  <select id="rep-select">
    <option value="">Assign to rep…</option>
  </select>

  <button id="assign-btn" disabled>Assign</button>
  <button id="export-btn" disabled>Export CSV</button>
</div>

<!-- ============================ -->
<!-- MAIN LAYOUT -->
<!-- ============================ -->
<div id="main">
  <div id="map"></div>

  <div id="sidebar">
    <h3>Selection Summary</h3>
    <p><strong>Stops:</strong> <span id="selected-count">0</span></p>
    <p><strong>Revenue:</strong> $<span id="selected-revenue">0.00</span></p>

    <h3>Route Overview</h3>
    <table id="route-table">
      <thead>
        <tr>
          <th>Rep</th>
          <th># Stops</th>
          <th>Total Rev</th>
          <th>Avg/Stop</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h3>Selected Accounts</h3>
    <ul id="selected-list"></ul>

    <h3>Account Details</h3>
    <div id="detail-panel">
      <p>No account selected.</p>
    </div>
  </div>
</div>

<!-- ============================ -->
<!-- SCRIPTS -->
<!-- ============================ -->

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Turf.js (required for concave hulls) -->
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<!-- Your App -->
<script src="app.js"></script>

</body>
</html>
